<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with {{ other_user.username }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .messages-container {
            height: 500px;
            overflow-y: auto;
            border: 1px solid #ddd;
            padding: 15px;
            background-color: #f9f9f9;
            margin-bottom: 15px;
        }
        .message {
            margin-bottom: 10px;
        }
        .message.sent {
            text-align: right;
        }
        .message.sent .bubble {
            background-color: #007bff;
            color: white;
            border-radius: 15px 15px 0px 15px;
        }
        .message.received .bubble {
            background-color: #e9ecef;
            border-radius: 15px 15px 15px 0px;
        }
        .bubble {
            display: inline-block;
            padding: 10px 15px;
            max-width: 70%;
            word-wrap: break-word;
        }
        .timestamp {
            font-size: 0.8em;
            color: #999;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <div class="d-flex justify-content-between align-items-center">
                            <h5 class="mb-0">{{ other_user.username }}</h5>
                            <a href="{% url 'chat_list' %}" class="btn btn-outline-light btn-sm">Back</a>
                        </div>
                    </div>
                    
                    <div class="messages-container" id="messagesContainer">
                        {% if messages %}
                            {% for message in messages %}
                                <div class="message {% if message.sender == request.user %}sent{% else %}received{% endif %}">
                                    <div class="bubble">
                                        {{ message.content }}
                                    </div>
                                    <div class="timestamp">
                                        {{ message.timestamp|date:"M d, H:i" }}
                                    </div>
                                </div>
                            {% endfor %}
                        {% else %}
                            <div class="text-center text-muted py-5">
                                <p>No messages yet. Start a conversation with {{ other_user.username }}!</p>
                            </div>
                        {% endif %}
                    </div>

                    <div class="card-body">
                        <form id="messageForm" class="d-flex gap-2">
                            {% csrf_token %}
                            <input 
                                type="text" 
                                class="form-control" 
                                name="message" 
                                id="messageInput"
                                placeholder="Type a message..."
                                required
                            >
                            <button type="submit" class="btn btn-primary">Send</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const messagesContainer = document.getElementById('messagesContainer');
        const currentUsername = "{{ request.user.username }}";
        const otherUserId = "{{ other_user.id }}";
        const wsScheme = window.location.protocol === 'https:' ? 'wss' : 'ws';
        const chatSocket = new WebSocket(wsScheme + '://' + window.location.host + '/ws/dm/' + otherUserId + '/');

        chatSocket.onopen = function() {
            console.log('Direct message socket opened');
        };

        chatSocket.onmessage = function(e) {
            const data = JSON.parse(e.data);
            if (data.type !== 'chat_message') {
                return;
            }

            const isSent = data.username === currentUsername;
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ' + (isSent ? 'sent' : 'received');

            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = 'bubble';
            bubbleDiv.textContent = data.message;
            messageDiv.appendChild(bubbleDiv);

            const timestampDiv = document.createElement('div');
            timestampDiv.className = 'timestamp';
            timestampDiv.textContent = new Date().toLocaleTimeString();
            messageDiv.appendChild(timestampDiv);

            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        };

        chatSocket.onclose = function(e) {
            console.error('Direct chat socket closed unexpectedly');
        };

        document.getElementById('messageForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (message.length === 0) {
                return;
            }
            chatSocket.send(JSON.stringify({
                type: 'chat_message',
                message: message
            }));
            input.value = '';
        });

        if (messagesContainer) {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
    </script>
</body>
</html>
